name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  API_IMAGE: jobapp-api
  WORKER_IMAGE: jobapp-worker
  FRONTEND_IMAGE: jobapp-frontend

jobs:

# ────────────────────────────────────────────────
# JOB 1: LINT
# ────────────────────────────────────────────────
  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python with flake8
        run: |
          flake8 api/main.py --max-line-length=100
          flake8 worker/worker.py --max-line-length=100

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install eslint
        run: |
          cd frontend
          npm install eslint --save-dev

      - name: Lint JavaScript with eslint
        run: |
          cd frontend
          npx eslint app.js --env node --env es2021 \
            --rule '{"no-unused-vars":"warn","no-undef":"error"}' \
            --parser-options "ecmaVersion:2021"

      - name: Install hadolint
        run: |
          wget -qO /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfiles with hadolint
        run: |
          hadolint api/Dockerfile
          hadolint worker/Dockerfile
          hadolint frontend/Dockerfile


# ────────────────────────────────────────────────
# JOB 2: TEST
# ────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd api
          pip install -r requirements.txt

      - name: Run pytest with coverage
        run: |
          cd api
          pytest tests/ \
            --cov=. \
            --cov-report=html:coverage_report \
            --cov-report=term-missing \
            -v

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage_report/
          retention-days: 7


# ────────────────────────────────────────────────
# JOB 3: BUILD
# ────────────────────────────────────────────────
  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: [test]

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get short git SHA
        id: sha
        run: echo "sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build API image
        run: |
          docker build \
            -t localhost:5000/${{ env.API_IMAGE }}:${{ steps.sha.outputs.sha }} \
            -t localhost:5000/${{ env.API_IMAGE }}:latest \
            ./api
          docker push localhost:5000/${{ env.API_IMAGE }}:${{ steps.sha.outputs.sha }}
          docker push localhost:5000/${{ env.API_IMAGE }}:latest

      - name: Build Worker image
        run: |
          docker build \
            -t localhost:5000/${{ env.WORKER_IMAGE }}:${{ steps.sha.outputs.sha }} \
            -t localhost:5000/${{ env.WORKER_IMAGE }}:latest \
            ./worker
          docker push localhost:5000/${{ env.WORKER_IMAGE }}:${{ steps.sha.outputs.sha }}
          docker push localhost:5000/${{ env.WORKER_IMAGE }}:latest

      - name: Build Frontend image
        run: |
          docker build \
            -t localhost:5000/${{ env.FRONTEND_IMAGE }}:${{ steps.sha.outputs.sha }} \
            -t localhost:5000/${{ env.FRONTEND_IMAGE }}:latest \
            ./frontend
          docker push localhost:5000/${{ env.FRONTEND_IMAGE }}:${{ steps.sha.outputs.sha }}
          docker push localhost:5000/${{ env.FRONTEND_IMAGE }}:latest

      - name: Save images as tar files
        run: |
          docker save localhost:5000/${{ env.API_IMAGE }}:latest | gzip > api-image.tar.gz
          docker save localhost:5000/${{ env.WORKER_IMAGE }}:latest | gzip > worker-image.tar.gz
          docker save localhost:5000/${{ env.FRONTEND_IMAGE }}:latest | gzip > frontend-image.tar.gz

      - name: Upload images as artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: "*.tar.gz"
          retention-days: 1


# ────────────────────────────────────────────────
# JOB 4: SECURITY SCAN
# ────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build]

    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download images artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-images

      - name: Load images into Docker
        run: |
          docker load < api-image.tar.gz
          docker load < worker-image.tar.gz
          docker load < frontend-image.tar.gz

      - name: Scan API image with Trivy
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/${{ env.API_IMAGE }}:latest
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Scan Worker image with Trivy
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/${{ env.WORKER_IMAGE }}:latest
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Scan Frontend image with Trivy
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/${{ env.FRONTEND_IMAGE }}:latest
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Upload Trivy SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .
          category: trivy


# ────────────────────────────────────────────────
# JOB 5: INTEGRATION TEST
# ────────────────────────────────────────────────
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [security-scan]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Download images artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-images

      - name: Load images into Docker
        run: |
          docker load < api-image.tar.gz
          docker load < worker-image.tar.gz
          docker load < frontend-image.tar.gz

      - name: Tag images for docker compose
        run: |
          docker tag localhost:5000/${{ env.API_IMAGE }}:latest ${{ env.API_IMAGE }}:latest
          docker tag localhost:5000/${{ env.WORKER_IMAGE }}:latest ${{ env.WORKER_IMAGE }}:latest
          docker tag localhost:5000/${{ env.FRONTEND_IMAGE }}:latest ${{ env.FRONTEND_IMAGE }}:latest

      - name: Create .env file
        run: |
          echo "REDIS_HOST=redis" > .env
          echo "REDIS_PORT=6379" >> .env
          echo "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}" >> .env
          echo "API_PORT=8000" >> .env
          echo "FRONTEND_PORT=3000" >> .env
          echo "FRONTEND_CONTAINER_PORT=3000" >> .env
          echo "API_URL=http://api:8000" >> .env
          echo "APP_ENV=production" >> .env

      - name: Start full stack
        run: docker compose up -d --no-build

      - name: Wait for all services to be healthy
        run: |
          echo "Waiting for services to become healthy..."
          WAITED=0
          while [ $WAITED -lt 120 ]; do
            HEALTHY=$(docker compose ps | grep -c "healthy" || true)
            echo "Healthy services: $HEALTHY / 4"
            if [ "$HEALTHY" -ge 4 ]; then
              echo "All services healthy"
              exit 0
            fi
            sleep 5
            WAITED=$((WAITED + 5))
          done
          echo "Services did not become healthy in time"
          docker compose ps
          exit 1

      - name: Run integration test script
        run: |
          chmod +x integration_test.sh
          ./integration_test.sh

      - name: Tear down stack
        if: always()
        run: docker compose down -v


# ────────────────────────────────────────────────
# JOB 6: DEPLOY
# ────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [integration-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy rolling update to server
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'ENDSSH'
            set -e
            cd /opt/jobapp
            git pull origin main

            rolling_update() {
              SERVICE=$1
              echo "Rolling update: $SERVICE"
              docker compose build $SERVICE
              docker compose up -d --no-deps --build $SERVICE

              HEALTHY=false
              for i in $(seq 1 12); do
                HEALTH=$(docker inspect \
                  --format='{{.State.Health.Status}}' \
                  $(docker compose ps -q $SERVICE) 2>/dev/null || echo "unknown")
                echo "Check $i/12: $HEALTH"
                if [ "$HEALTH" = "healthy" ]; then
                  HEALTHY=true
                  break
                fi
                sleep 5
              done

              if [ "$HEALTHY" = "true" ]; then
                echo "$SERVICE deployed successfully"
              else
                echo "$SERVICE failed health check - aborting"
                exit 1
              fi
            }

            rolling_update api
            rolling_update worker
            rolling_update frontend
            echo "All services deployed"
          ENDSSH
