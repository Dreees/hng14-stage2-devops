name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: dreees

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Python syntax
        run: |
          python3 -m py_compile api/main.py
          python3 -m py_compile worker/worker.py
      - name: Validate Node syntax
        run: node -c frontend/app.js

  build-and-scan:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        service: [api, worker, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: false
          tags: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
      - name: Run Trivy vulnerability scanner (non-blocking)
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: '${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:ci-test'
          format: table
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  integration:
    runs-on: ubuntu-latest
    needs: build-and-scan
    steps:
      - uses: actions/checkout@v4
      - name: Prepare environment for Compose
        run: echo "REDIS_PASSWORD=testpass123" > .env
      - name: Start full stack and wait for healthy state
        run: docker compose up -d --wait
      - name: Verify end-to-end job flow
        run: |
          echo "Testing job submission..."
          

          for i in $(seq 1 5); do
            RESP=$(curl -s -X POST http://localhost:3000/submit 2>/dev/null)
            if [ -n "$RESP" ] && echo "$RESP" | grep -q "job_id"; then
              echo "Submit succeeded: $RESP"
              break
            fi
            echo "Retry $i/5: waiting for frontend..."
            sleep 3
          done
          
          # Extract job_id safely
          ID=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('job_id',''))" 2>/dev/null)
          if [ -z "$ID" ]; then
            echo "Failed to extract job_id from: $RESP"
            docker compose logs frontend
            exit 1
          fi
          echo "Tracking job: $ID"
          
          # Wait for worker processing
          sleep 5
          
          # Verify completion with retry
          for i in $(seq 1 5); do
            STATUS=$(curl -s http://localhost:3000/status/$ID 2>/dev/null)
            if echo "$STATUS" | grep -q '"status":"completed"'; then
              echo "Job completed: $STATUS"
              break
            fi
            echo "Status retry $i/5: $STATUS"
            sleep 3
          done
          
          # Final assertion
          if ! echo "$STATUS" | grep -q '"status":"completed"'; then
            echo "Job not completed after retries: $STATUS"
            docker compose logs worker api
            exit 1
          fi
          echo "End-to-end job flow succeeded"
      - name: Cleanup containers
        if: always()
        run: docker compose down
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deployment summary
        run: |
          echo "Pipeline completed successfully"
          echo ""
          echo "Images built and scanned locally in CI:"
          for service in api worker frontend; do
            echo "  - ${{ env.IMAGE_PREFIX }}/${service}:ci-test"
          done