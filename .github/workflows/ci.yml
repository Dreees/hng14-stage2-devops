name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Python syntax
        run: |
          python3 -m py_compile api/main.py
          python3 -m py_compile worker/worker.py
      - name: Validate Node syntax
        run: node -c frontend/app.js

  build-and-scan:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        service: [api, worker, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}'
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  integration:
    runs-on: ubuntu-latest
    needs: build-and-scan
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Prepare environment
        run: echo "REDIS_PASSWORD=testpass123" > .env
      - name: Start services
        run: docker compose up -d
      - name: Wait for healthy state
        run: |
          for i in $(seq 1 30); do
            if docker compose ps | grep -q "(healthy)"; then
              echo "All services healthy"
              break
            fi
            sleep 10
          done
      - name: Verify end-to-end job flow
        run: |
          RESP=$(curl -s -X POST http://localhost:3000/submit)
          ID=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          sleep 5
          STATUS=$(curl -s http://localhost:3000/status/$ID)
          echo "$STATUS" | grep -q '"status":"completed"' || (echo "Flow failed: $STATUS" && exit 1)
      - name: Cleanup
        if: always()
        run: docker compose down

  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Tag images as latest
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api:${{ github.sha }}
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api:latest
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/worker:${{ github.sha }}
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/worker:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/worker:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/worker:latest
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:latest
      - name: Deployment summary
        run: echo "Images tagged as latest and ready for production pull."